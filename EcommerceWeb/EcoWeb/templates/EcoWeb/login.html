<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% extends 'EcoWeb/base.html' %}
    {% block content %}
    <h2>Login</h2>
    {% if msg %}
    <p class="error">{{ msg }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
 
    {% endblock %}

    <a href="{% url 'register' %}">Register</a>
</body>
</html>
