<!DOCTYPE html>
<html>

<head>
    <title>EcoWeb</title>
    {% load static %}
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            background-image: url("{% static 'images/bg.jpg' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }

        .container {
            width: 50%;
            margin: auto;
            background-color: rgba(95, 158, 160, 0.8);
            padding: 20px;
            margin-top: 50px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);

        }

        input,
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            background-color: burlywood;
        }

        button {
            padding: 8px 15px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        a {
            text-decoration: none;
            color: darkblue;
        }

        .nav {
            margin-bottom: 20px;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav">
            {% if user.is_authenticated %}
            <a href="{% url 'productlist' %}">My Products</a> |
            <a href="{% url 'product_create' %}">Add Product</a> |
            <a href="{% url 'logout' %}">Logout</a>
            {% else %}
            <a href="{% url 'login' %}">Login</a> |
            <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>

        {% block content %}{% endblock %}
    </div>

</body>
</html>
